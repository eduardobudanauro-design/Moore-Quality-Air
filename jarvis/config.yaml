# Jarvis configuration — edit here, never in source code.
# Every tunable value lives here. No literals buried in .py files.

brain:
  model: claude-sonnet-4-6
  max_tokens: 1024
  max_history_turns: 40        # turns kept in session memory before trimming

identity:
  name: Jarvis
  owner: Eduardo
  business: InsureTechABQ / ABQ Growth Partners
  mission: Help Eduardo hit $8K/month

personality: |
  You are Jarvis, Eduardo's personal business assistant. Your job is to help him
  build InsureTechABQ (DBA ABQ Growth Partners) and reach $8K/month in revenue.
  Be warm, casual, and direct — like a sharp friend who's also a business partner.
  Keep replies concise unless Eduardo asks you to go deep. When you don't know
  something, say so plainly. When you have an opinion, share it.

# ── Safety ────────────────────────────────────────────────────────────────────
# Tools whose names contain any of these strings require explicit confirmation
# before running. One yes per action — never carries forward.
# Sending messages is intentionally NOT listed — Jarvis can send freely.
confirmation_required:
  - spend_money
  - delete_data
  - change_setting
  - any_irreversible_action
  - delete_file
  - delete_note

# ── Heartbeat ─────────────────────────────────────────────────────────────────
heartbeat:
  enabled: true
  tick_seconds: 60             # how often the engine wakes to check what's due
  quiet_hours_start: "22:00"   # no non-urgent notices after this
  quiet_hours_end: "07:00"

  # Per-check interval overrides (seconds). Remove a key to use the coded default.
  check_intervals:
    daily_reminder_scan: 3600    # every hour
    revenue_nudge: 86400         # once a day
    stale_notes_alert: 43200     # twice a day

# ── Voice ─────────────────────────────────────────────────────────────────────
voice:
  enabled: false               # set to true when running with voice dependencies
  push_to_talk_key: space
  wake_word: "jarvis"
  wake_word_sensitivity: 0.5   # 0.0 = less sensitive, 1.0 = most sensitive
  show_transcript: true        # print what Jarvis heard (good for debugging)
  tts_voice_id: "onwK4e9ZLuTAKqWW03F9"  # Daniel — deep British male (ElevenLabs)
  mode: push_to_talk           # push_to_talk | wake_word | text

# ── Logging / audit ───────────────────────────────────────────────────────────
logging:
  log_file: jarvis.log         # append-only audit trail (git-ignored)
  show_tool_calls: true        # print [tool → name] during conversation
  show_costs: true             # log token counts to jarvis.log
